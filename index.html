<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="give a dime">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>give a dime · PIXEL LEDGER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#000;--panel:#0c0f14;--panel2:#121722;--line:#2a3242;
  --white:#f4f6fb;--gray:#8b93a7;--gray-dim:#565f73;
  --blue:#4aa3ff;--blue-deep:#2f6fd0;--blue-soft:#1a2740;--danger:#ff5d6c;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--white);
  font-family:'Press Start 2P',monospace;font-size:10px;line-height:1.7;
  -webkit-text-size-adjust:100%;padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);}
h1,h2,h3{font-weight:400;letter-spacing:1px}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:9px;background:var(--panel2);
  color:var(--white);border:2px solid var(--line);padding:8px;outline:none;-webkit-appearance:none;}
input:focus,select:focus{border-color:var(--blue)}
.app{max-width:1100px;margin:0 auto;padding:16px}
header{border:3px solid var(--line);background:var(--panel);padding:16px;margin-bottom:14px;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.logo{font-size:16px}.logo .tag{font-size:8px;color:var(--blue);display:block;margin-top:6px}
.proj-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select.proj{min-width:150px}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{background:var(--panel);border:2px solid var(--line);color:var(--gray);padding:10px 14px}
.tab.active{color:var(--white);border-color:var(--blue);background:var(--blue-soft)}
.btn{background:var(--blue-deep);border:2px solid var(--blue);color:var(--white);padding:10px 14px}
.btn:hover{background:var(--blue)}
.btn.ghost{background:transparent;border-color:var(--line);color:var(--gray)}
.btn.ghost:hover{border-color:var(--blue);color:var(--white)}
.btn.danger{background:transparent;border-color:var(--danger);color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#000}
.btn.sm{padding:6px 10px;font-size:8px}
.panel{border:3px solid var(--line);background:var(--panel);padding:16px;margin-bottom:14px}
.panel h2{font-size:11px;margin:0 0 14px;color:var(--blue)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:130px}
.field label{font-size:8px;color:var(--gray)}
.hidden{display:none!important}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.cat{border:2px solid var(--line);background:var(--panel2);padding:10px 6px;text-align:center;font-size:8px;color:var(--gray)}
.cat.active{border-color:var(--blue);color:var(--white);background:var(--blue-soft)}
.item{border:2px solid var(--line);background:var(--panel2);padding:12px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.item .meta{font-size:8px;color:var(--gray);margin-top:6px;line-height:1.9}
.amt{font-size:11px;white-space:nowrap;text-align:right}
.amt .hkd{color:var(--gray);font-size:8px;display:block;margin-top:4px}
.badge{border:1px solid var(--blue);color:var(--blue);padding:2px 5px;font-size:7px;margin-right:4px}
.badge.rec{border-color:var(--gray);color:var(--gray)}
.split-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.split-row .name{flex:1;font-size:8px;color:var(--gray)}
.split-row input{width:90px}
.people-list{display:flex;flex-direction:column;gap:6px}
.person-tag{display:flex;justify-content:space-between;align-items:center;border:2px solid var(--line);padding:8px;background:var(--panel2)}
.stat{border:2px solid var(--line);background:var(--panel2);padding:14px;text-align:center}
.stat .num{font-size:16px;color:var(--blue);margin-top:8px}
.stat .lab{font-size:8px;color:var(--gray)}
.ai-box{border:2px solid var(--blue);background:var(--blue-soft);padding:14px;line-height:2}
.ai-box .head{color:var(--blue);margin-bottom:10px}
.advice{border-left:3px solid var(--blue);padding-left:10px;margin:8px 0;color:var(--gray)}
.settle{border:2px solid var(--danger);background:#1a0f12;padding:14px;margin-bottom:14px}
.settle .head{color:var(--danger);margin-bottom:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50}
.modal{border:3px solid var(--blue);background:var(--panel);padding:20px;max-width:520px;width:100%;max-height:90vh;overflow:auto}
.empty{color:var(--gray-dim);text-align:center;padding:30px;font-size:8px}
canvas{background:var(--panel2);border:2px solid var(--line);padding:8px}
.small{font-size:8px;color:var(--gray)}
.rate-tag{font-size:7px;color:var(--gray-dim);margin-top:4px}
.editing{border-color:var(--danger)!important}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">give a dime<span class="tag">▸ PIXEL LEDGER v1</span></div>
    <div class="proj-bar">
      <select class="proj" id="projSelect"></select>
      <button class="btn sm" id="newProjBtn">+ PROJECT</button>
      <button class="btn ghost sm" id="editProjBtn">EDIT</button>
    </div>
  </header>

  <div class="settle hidden" id="settleBanner">
    <div class="head">▸ MONTHLY SETTLEMENT</div>
    <div class="small" id="settleText"></div>
    <div class="row" style="margin-top:10px">
      <button class="btn sm" id="doSettleBtn">VIEW BALANCES</button>
      <button class="btn ghost sm" id="dismissSettleBtn">LATER</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="add">+ ADD</button>
    <button class="tab" data-tab="list">LEDGER</button>
    <button class="tab" data-tab="summary">SUMMARY</button>
    <button class="tab" data-tab="ai">AI ADVISOR</button>
  </div>

  <section id="tab-add">
    <div class="panel" id="addPanel">
      <h2 id="addTitle">▸ NEW SPENDING</h2>
      <div class="row">
        <div class="field" style="flex:2"><label>DESCRIPTION</label><input id="descIn" placeholder="e.g. team lunch"></div>
        <div class="field"><label>AMOUNT (<span id="curLabel">HKD</span>)</label><input id="amtIn" type="number" inputmode="decimal" placeholder="0.00"></div>
        <div class="field"><label>DATE</label><input id="dateIn" type="date"></div>
      </div>
      <label class="small">CATEGORY</label>
      <div class="cat-grid" id="catGrid"></div>
      <div class="row" style="margin-top:14px">
        <div class="field"><label>FREQUENCY</label>
          <select id="freqIn"><option value="once">ONE-TIME</option><option value="monthly">MONTHLY (recurring)</option></select>
        </div>
        <div class="field hidden" id="expiryField"><label>EXPIRY (optional)</label><input id="expiryIn" type="date"></div>
      </div>
      <div class="panel" style="border-color:var(--blue-soft)">
        <label class="small">WHO PAID</label>
        <select id="payerIn" style="width:100%;margin:8px 0"></select>
        <label class="small">WHO SHARES (tap to include)</label>
        <div class="cat-grid" id="shareBtns" style="margin:8px 0"></div>
        <label class="small">SPLIT MODE</label>
        <div class="row" style="margin:8px 0">
          <select id="splitModeIn" style="flex:1">
            <option value="equal">SPLIT EQUALLY</option>
            <option value="amount">EXACT AMOUNT</option>
            <option value="percent">BY PERCENT (%)</option>
          </select>
        </div>
        <div id="splitRows"></div>
        <div class="small" id="splitHint" style="margin-top:6px"></div>
      </div>
      <div class="row">
        <button class="btn" id="saveExpBtn" style="flex:1">▸ SAVE SPENDING</button>
        <button class="btn ghost hidden" id="cancelEditBtn">CANCEL EDIT</button>
      </div>
    </div>
  </section>

  <section id="tab-list" class="hidden">
    <div class="panel">
      <h2>▸ LEDGER · <span id="listMonthLabel"></span></h2>
      <div class="row"><input type="month" id="monthFilter" style="flex:1"><button class="btn ghost sm" id="thisMonthBtn">THIS MONTH</button></div>
      <div id="expList"></div>
    </div>
  </section>

  <section id="tab-summary" class="hidden">
    <div class="grid" style="margin-bottom:14px">
      <div class="stat"><div class="lab">MONTH TOTAL (HKD)</div><div class="num" id="statTotal">—</div></div>
      <div class="stat"><div class="lab">TOP CATEGORY</div><div class="num" id="statTop" style="font-size:10px">—</div></div>
      <div class="stat"><div class="lab">RECURRING/MO</div><div class="num" id="statRec">—</div></div>
    </div>
    <div class="panel"><h2>▸ 6-MONTH TREND (HKD)</h2><canvas id="trendChart" height="130"></canvas></div>
    <div class="panel"><h2>▸ CATEGORY BREAKDOWN</h2><canvas id="catChart" height="130"></canvas></div>
    <div class="panel"><h2>▸ WHO OWES WHOM</h2><div id="balanceList"></div></div>
  </section>

  <section id="tab-ai" class="hidden">
    <div class="panel"><h2>▸ AI SPENDING ADVISOR</h2><div class="ai-box" id="aiBox"></div></div>
  </section>
</div>

<div class="modal-bg hidden" id="projModal">
  <div class="modal">
    <h2 style="color:var(--blue);font-size:12px" id="projModalTitle">NEW PROJECT</h2>
    <div class="field" style="margin-bottom:12px"><label>PROJECT NAME</label><input id="pName" placeholder="e.g. Japan Trip"></div>
    <div class="field" style="margin-bottom:12px"><label>CURRENCY</label><select id="pCurrency"></select></div>
    <label class="small">PEOPLE (1-4)</label>
    <div class="people-list" id="peopleList" style="margin:8px 0"></div>
    <button class="btn ghost sm" id="addPersonBtn">+ ADD PERSON</button>
    <div class="row" style="margin-top:16px">
      <button class="btn" id="saveProjBtn" style="flex:1">SAVE</button>
      <button class="btn ghost" id="closeProjBtn">CANCEL</button>
      <button class="btn danger sm hidden" id="delProjBtn">DELETE</button>
    </div>
  </div>
</div>

<script>
/* ===== CONFIG ===== */
const CATEGORIES = ["lunch","dinner","grocery","health","beauty","entertainment","gift",
"pocket money","taxi/uber","public transport","accommodation","hotel","flight","clothes",
"music","snacks & drinks","telecom","insurance","investment","teaching"];
const CURRENCIES = ["HKD","USD","EUR","GBP","JPY","CNY","TWD","KRW","SGD","AUD","THB","MYR"];

/* ===== INDEXEDDB STORAGE (app-owned) ===== */
const IDB = {
  db:null,
  open(){return new Promise((res,rej)=>{
    const r=indexedDB.open("giveadime",1);
